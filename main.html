<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main | Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!--css + tailwind + daisy ui -->
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>
    <!-- header section start -->
    <header class="sticky top-0 z-50">
        <nav class="navbar bg-base-100 shadow-sm px-5 sm:px-16 py-5">
            <div href="" class="flex-1 flex items-center justify-start gap-3 ">
                <a href="main.html"><img class="w-8" src="./assets/github-logo.png" alt="logo"></a>
                <a href="main.html" class="hidden md:block text-2xl font-semibold primary-color ">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <div class="input input-bordered w-24 sm:w-auto">
                    <i class="fa-brands fa-sistrix secondary-color"></i>
                    <input id="search-field" class="placeholder:text-[#64748B]" type="text"
                        placeholder="Search issues..." />
                </div>
                <button id="search-btn" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i>
                    Search</button>
            </div>
        </nav>
    </header>
    <!-- header section end -->


    <!-- main section start -->
    <main>
        <!-- button and issue section start -->
        <section class="container mx-auto px-5  mt-16">
            <!-- button section -->
            <div class="navbar bg-base-100 shadow-sm px-5 py-5 flex gap-3 justify-start rounded-md">
                <button id="all-issues-btn" class=" all-issue-btn btn bg-white active sm:w-28"> All</button>
                <button id="open-issues-btn" class=" all-issue-btn btn bg-white sm:w-28"> Open</button>
                <button id="close-issues-btn" class=" all-issue-btn btn bg-white sm:w-28"> close</button>
            </div>
        </section>
        <!-- button and issue section end -->

        <section class="container mx-auto px-5  mt-4 ">
            <div class="bg-[#FBFBFB] rounded-t-md">
                <!-- issue section -->
                <div
                    class=" navbar bg-base-100 shadow-sm px-5 py-5 flex flex-col items-start sm:flex-row sm:items-center  gap-3 justify-between rounded-t-md border-b border-gray-300">

                    <div class="flex items-center justify-center gap-4">
                        <img class="bg-blue-100 p-2 rounded-full" src="./assets/Aperture.png" alt="Aperture">
                        <div>
                            <h3 id="issues-number-count" class="text-xl font-semibold primary-color"></h3>
                            <p class="secondary-color">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-4 items-center justify-center">
                        <div class="flex items-center justify-center gap-2">
                            <span class="block bg-green-700 rounded-full w-3 h-3"></span>
                            <p class="font-medium primary-color text-[16px]">Open</p>
                        </div>
                        <div class="flex items-center justify-center gap-2">
                            <span class="block bg-purple-700 rounded-full w-3 h-3"></span>
                            <p class="font-medium primary-color text-[16px]">Close</p>
                        </div>
                    </div>
                </div>

                <div id="spinner" class="z-50 flex h-screen justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>

                <!-- issu card section start -->
                <div id="issues-card-container" class="p-5 bg-[#FBFBFB] grid gap-5 sm:grid-cols-2  xl:grid-cols-4">

                </div>
                <!-- issu card section end -->

            </div>
        </section>

        <!-- modal section -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
        <dialog id="issue-detail-modal" class="modal">
            <div class="modal-box">


                <div id="modal-content" class=" card bg-base-100  w-auto">

                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
        <!-- modal section -->
    </main>
    <!-- main section end -->



    <script src="./script/main.js"></script>
</body>

</html>
